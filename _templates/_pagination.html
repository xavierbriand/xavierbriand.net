<ul class="pager">
    {% if not pagination.has_next %}
    <li class="previous">
        <a href="{{ link_to(pagination.url_key, page=pagination.page - 1) }}">&larr; Newer</a>
    </li>
    {%endif %}
    {% if not pagination.has_prev %}
    <li class="next">
        <a href="{{ link_to(pagination.url_key, page=pagination.page + 1) }}">Older &rarr;</a>
    </li>
    {%endif %}
</ul>
